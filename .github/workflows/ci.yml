name: Exness CI

on:
  push:
    branches:
      - main
      - dev

  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Typecheck Backend
        continue-on-error: true
        run: bun run typecheck:backend

      - name: Typecheck Price Poller
        continue-on-error: true
        run: bun run typecheck:price-poller

      - name: Typecheck Matching Engine
        continue-on-error: true
        run: bun run typecheck:matching-engine

      - name: Typecheck Websocket
        continue-on-error: true
        run: bun run typecheck:websocket

      - name: Verify Docker Compose
        continue-on-error: true
        run: docker compose config

      - name: Build Docker Services
        continue-on-error: true
        run: docker compose build